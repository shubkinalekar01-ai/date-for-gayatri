<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Gayatri ❤️</title>
<style>
body {
    text-align: center;
    font-family: Arial;
    background: linear-gradient(to right, #ffd1dc, #ffe6eb);
    margin-top: 50px;
}

h1 {
    font-size: 28px;
    color: #333;
}

img {
    width: 250px;
    border-radius: 20px;
    margin-bottom: 20px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 20px;
    margin: 10px;
    cursor: pointer;
}

#yes {
    background-color: #ff6b81;
    color: white;
}

#no {
    background-color: #ccc;
    position: absolute;
}

#message {
    display: none;
    margin-top: 20px;
    font-size: 20px;
}
</style>
</head>

<body>

<img src="YOUR_IMAGE_LINK_HERE">

<h1>Gayatri, will you go out with me this Saturday?</h1>

<button id="yes">Yes ❤️</button>
<button id="no">No 🙈</button>

<div id="message">
    <p>I knew you’d say yes 🥺❤️</p>
    <p>Yayyy! I’ll pick you up this Saturday 💕</p>
</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    noBtn.style.top = Math.random() * window.innerHeight + "px";
    noBtn.style.left = Math.random() * window.innerWidth + "px";
});

document.getElementById("yes").onclick = () => {
    document.getElementById("message").style.display = "block";
};
</script>

</body>
</html>
