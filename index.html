<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Date for Gayatri 💖</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #ffe6f0;
      margin-top: 50px;
    }

    h1 {
      color: #ff4d88;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 20px;
      margin: 10px;
      cursor: pointer;
    }

    #yes {
      background-color: #ff4d88;
      color: white;
    }

    #no {
      background-color: #ccc;
      position: absolute;
    }

    #message {
      display: none;
      margin-top: 20px;
      font-size: 20px;
      color: #ff4d88;
    }
  </style>
</head>

<body>

  <h1>Gayatri, will you go out with me this Saturday? 💖</h1>

  <!-- 💕 IMAGE -->
  <div style="margin-top:20px;">
    <img src="https://i.ibb.co/NnpXzNFp/main.png" 
         alt="Cute Us" 
         style="width:280px; border-radius:50%; box-shadow:0 0 25px pink;">
  </div>

  <!-- 💘 BUTTONS -->
  <button id="yes">Yes ❤️</button>
  <button id="no">No 🙈</button>

  <!-- 💌 MESSAGE -->
  <div id="message">
    <p>I knew you'd say yes 😘💖</p>
    <p>Yayyy! I’ll pick you up this Saturday 🚗🌸</p>
  </div>

  <!-- 🎯 SCRIPT -->
  <script>
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", () => {
      noBtn.style.top = Math.random() * window.innerHeight + "px";
      noBtn.style.left = Math.random() * window.innerWidth + "px";
    });

    document.getElementById("yes").onclick = () => {
      document.getElementById("message").style.display = "block";
    };
  </script>

</body>
</html>
